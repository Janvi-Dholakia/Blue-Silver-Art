<!DOCTYPE html>
<html>
<head>
    <title>Blue Silver Art</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1 class="title">Blue Silver Art</h1>

<div class="card">

    <div class="form-grid">

        <input type="text" id="customer_name" placeholder="Customer Name">

        <input type="text" id="place" placeholder="Place">

        <input type="text" id="phone" placeholder="Phone">

        <input type="date" id="date">

    </div>

    <table id="items">

        <thead>
            <tr>
                <th>Description</th>
                <th>Net Weight</th>
                <th>Touch</th>
                <th>Wastage</th>
                <th>Labour</th>
                <th>Silver</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

    <button class="btn" onclick="addRow()">
        Add Item
    </button>

    <button onclick="saveBill()" class="btn primary">Save Bill</button>

    <button id="pdfBtn"
            class="btn"
            style="display:none;background:#dc3545;margin-left:10px;">
        Download PDF
    </button>

    <br><br>

    <a href="/bills" class="btn">View Saved Bills</a>

    <h2>
        Total: ₹ <span id="total">0.00</span>
    </h2>

</div>

<script
src="{{ url_for('static', filename='js/script.js') }}">
</script>

</body>
</html>
